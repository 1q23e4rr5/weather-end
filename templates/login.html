<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | هواشناسی هوشمند</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e27;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        /* حذف کامل همه افکت‌ها و لاگ‌ها */
        .weather-bg-layer, .fog-layer, .particle-layer, .lightning-strike, .cloud-mega, .weather-icon-float {
            display: none !important;
        }
        
        /* خورشید درخشان و روز روشن */
        body::after {
            content: '';
            position: fixed;
            top: -120px;
            right: -120px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 230, 120, 0.95) 0%, rgba(255, 200, 70, 0.8) 20%, rgba(255, 180, 50, 0.5) 40%, rgba(255, 200, 100, 0.2) 60%, transparent 80%);
            border-radius: 50%;
            filter: blur(15px);
            animation: sunGlow 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
            box-shadow: 0 0 150px rgba(255, 200, 80, 0.9), 0 0 300px rgba(255, 180, 50, 0.7), 0 0 500px rgba(255, 150, 30, 0.5);
        }
        body::before {
            content: '';
            position: fixed;
            top: -60px;
            right: -60px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 255, 220, 1) 0%, rgba(255, 230, 120, 0.95) 25%, rgba(255, 200, 80, 0.6) 50%, rgba(255, 180, 60, 0.3) 70%, transparent 90%);
            border-radius: 50%;
            filter: blur(8px);
            pointer-events: none;
            z-index: 0;
            animation: sunCore 3.5s ease-in-out infinite;
        }
        @keyframes sunGlow {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.95; filter: blur(15px); }
            50% { transform: scale(1.15) rotate(3deg); opacity: 1; filter: blur(12px); }
        }
        @keyframes sunCore {
            0%, 100% { transform: scale(1); opacity: 0.98; filter: blur(8px); }
            50% { transform: scale(1.12); opacity: 1; filter: blur(6px); }
        }
        
        /* پس‌زمینه آبی روشن روز */
        body {
            background: linear-gradient(165deg, #5a9fe0 0%, #87CEEB 30%, #a8d8f0 55%, #c5e5f7 80%, #ddf0ff 100%);
        }
        
        /* پرتوهای خورشید */
        .sun-rays {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 80% 5%, rgba(255, 240, 180, 0.25) 0%, transparent 50%);
        }
        .sun-rays::after {
            content: '';
            position: fixed;
            top: -80px;
            right: -80px;
            width: 500px;
            height: 500px;
            background: repeating-conic-gradient(from 0deg, rgba(255, 230, 150, 0.12) 0deg 8deg, transparent 8deg 16deg);
            border-radius: 50%;
            filter: blur(6px);
            animation: rayRotate 25s linear infinite;
        }
        @keyframes rayRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* کارت ورود با تم روشن */
        .login-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 0 80px rgba(255, 200, 80, 0.25), 0 0 150px rgba(255, 220, 80, 0.12);
            padding: 45px 40px;
            max-width: 470px;
            width: 90%;
            position: relative;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .login-card:hover {
            box-shadow: 0 35px 100px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.9), 0 0 120px rgba(255, 200, 80, 0.4), 0 0 200px rgba(255, 220, 100, 0.25);
            transform: translateY(-5px);
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 30px;
            background: linear-gradient(45deg, rgba(255, 200, 80, 0.5), rgba(255, 220, 150, 0.3), rgba(255, 180, 60, 0.5), rgba(255, 220, 100, 0.4), rgba(255, 200, 80, 0.6));
            z-index: -1;
            filter: blur(12px);
            animation: borderGlow 4s linear infinite;
            background-size: 300% 300%;
        }
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }
        .login-header i {
            font-size: 4rem;
            background: linear-gradient(180deg, #ffd700 0%, #ff8c00 40%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 20px rgba(255, 180, 40, 0.7)) drop-shadow(0 0 40px rgba(255, 150, 30, 0.5));
            animation: iconPulse 3s ease-in-out infinite;
            margin-bottom: 10px;
        }
        @keyframes iconPulse {
            0%, 100% { filter: drop-shadow(0 4px 20px rgba(255, 180, 40, 0.7)) drop-shadow(0 0 40px rgba(255, 150, 30, 0.5)); transform: scale(1); }
            50% { filter: drop-shadow(0 4px 35px rgba(255, 200, 50, 1)) drop-shadow(0 0 70px rgba(255, 180, 40, 0.9)); transform: scale(1.08); }
        }
        .login-header h3 {
            color: #1a2a4a;
            font-weight: 700;
            font-size: 1.7rem;
            text-shadow: 0 2px 15px rgba(255, 200, 80, 0.3);
            letter-spacing: 1px;
        }
        .login-header p {
            color: #2a4a6a;
            font-size: 0.95rem;
            text-shadow: 0 1px 5px rgba(255, 255, 255, 0.3);
        }
        
        .btn-google {
            background: #ffffff;
            color: #333;
            border: none;
            padding: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            border-radius: 12px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        .btn-google:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            background: #f8f9fa;
        }
        .btn-google i { color: #ea4335; font-size: 1.3rem; }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #4a6a8a;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
        }
        .divider::before { margin-left: 15px; }
        .divider::after { margin-right: 15px; }
        
        .form-control {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(0, 0, 0, 0.12);
            color: #1a2a3a;
            backdrop-filter: blur(10px);
            transition: all 0.4s;
            font-size: 0.95rem;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #ffd700;
            box-shadow: 0 0 25px rgba(255, 200, 40, 0.35), 0 0 0 3px rgba(255, 200, 40, 0.1);
            color: #1a2a3a;
        }
        .form-control::placeholder { color: rgba(0, 0, 0, 0.3); }
        
        .input-group-text {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #ff8c00;
            backdrop-filter: blur(10px);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #f9d976 0%, #f39c12 40%, #e67e22 100%);
            border: 1px solid rgba(255, 200, 50, 0.6);
            color: #1a2a3a;
            padding: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 1.5px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 1px 3px rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .btn-login::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, transparent 60%);
            animation: btnShine 3s infinite;
        }
        @keyframes btnShine {
            0% { transform: rotate(0deg) translate(-30%, -30%); }
            100% { transform: rotate(360deg) translate(-30%, -30%); }
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #f7dc6f 0%, #f1c40f 40%, #e67e22 100%);
            border-color: #ffd700;
            color: #1a2a3a;
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2), 0 0 40px rgba(255, 200, 40, 0.5), 0 0 80px rgba(255, 200, 80, 0.25);
        }
        
        .register-link {
            color: #e67e22;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s;
            text-shadow: 0 0 8px rgba(255, 200, 40, 0.2);
        }
        .register-link:hover {
            color: #f39c12;
            text-shadow: 0 0 20px rgba(255, 220, 60, 0.7);
            text-decoration: none;
        }
        
        /* مخفی کردن کامل پیام‌های فلش (لاگ‌ها) */
        .alert, .flashes, [role="alert"], .alert-dismissible {
            display: none !important;
        }
        
        /* حذف کامل هرگونه لاگ یا پیام اضافی */
        .d-none-log { display: none !important; }
        
        @media (max-width: 576px) {
            .login-card { padding: 30px 20px; border-radius: 22px; margin: 15px; }
            .login-header i { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <!-- فقط روز روشن و خورشید - هیچ افکت اضافی و هیچ لاگی نمایش داده نمی‌شود -->
    <div class="sun-rays"></div>
    
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-cloud-sun-rain"></i>
            <h3>ورود به هواشناسی هوشمند</h3>
            <p class="text-muted">به جمع هواشناسان حرفه‌ای بپیوندید</p>
        </div>
        
        <!-- پیام‌های فلش کاملاً مخفی شدند - هیچ لاگی نمایش داده نمی‌شود -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <!-- هیچ چیزی نمایش داده نمی‌شود -->
            {% endfor %}
        {% endwith %}
        
        <a href="{{ url_for('google_login') }}" class="btn btn-google w-100">
            <i class="fab fa-google me-2"></i> ورود با حساب گوگل
        </a>
        <div class="divider">یا</div>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label text-dark">نام کاربری یا ایمیل</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="نام کاربری یا ایمیل" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-dark">رمز عبور</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="رمز عبور" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="fas fa-sign-in-alt me-2"></i>ورود
            </button>
        </form>
        <div class="text-center mt-3">
            <p class="text-muted">حساب کاربری ندارید؟ <a href="{{ url_for('register') }}" class="register-link">ثبت نام کنید</a></p>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
